name: Golf Pool Sync

on:
  schedule:
    - cron: '0 14-23 * * 4-6'   # hourly Thu-Sat 9AM-6PM EST (UTC-5)
    - cron: '*/10 14-23 * * 0'  # every 10min Sunday 9AM-6PM EST
  workflow_dispatch:             # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger leaderboard sync
        run: |
          curl -f -X GET "${{ secrets.APP_URL }}/api/cron/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
